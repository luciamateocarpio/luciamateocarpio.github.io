<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Académico | Lucía Mateo Carpio</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #10b981;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --border: #e2e8f0;
            --linkedin-color: #0a66c2;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            background-color: var(--bg-body);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .ascii-banner {
            font-family: monospace;
            white-space: pre;
            color: var(--primary);
            line-height: 1.2;
            font-size: 9px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #eff6ff 0%, #f5f3ff 100%);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow-x: auto;
            text-align: center;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            background: var(--bg-card);
            padding: 35px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border-bottom: 4px solid var(--primary);
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            color: #0f172a;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--primary);
            font-size: 1.1rem;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .btn-profile {
            display: inline-flex;
            align-items: center;
            background-color: var(--linkedin-color);
            color: white;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
